name: Guru Investor OS

on:
  workflow_dispatch:
    inputs:
      module:
        type: choice
        default: rebalancer
        options: [rebalancer, sec]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rebalancer:
    name: Rebalancer (Groq AI)
    runs-on: ubuntu-latest
    if: github.event.inputs.module == 'rebalancer'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install aiohttp
      - name: Run Rebalancer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python rebalancer.py

  sec:
    name: SEC 13F Tracker
    runs-on: ubuntu-latest
    if: github.event.inputs.module == 'sec'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install aiohttp
      - name: Run SEC Tracker
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python sec_tracker.py
